<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>TSMC Dual-Mode Pump Construction Tracking System</title>
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>TSMC Dual-Mode Pump Construction Tracking System</h1>
    </header>
    <main>
        <section id="tracking">
            <h2>Tracking Information</h2>
            <p>Details about the construction progress and status of the pumps...</p>
        </section>
        <section id="interactive">
            <h2>Interactive Features</h2>
            <button id="updateButton">Update Tracking</button>
            <div id="output"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 TSMC</p>
    </footer>
    <script>
        document.getElementById('updateButton').addEventListener('click', function() {
            document.getElementById('output').innerText = 'Tracking updated!';
        });
    </script>
</body>
</html>
