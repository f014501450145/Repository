<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台積電雙模幫浦工程管理系統 - 雲端旗艦版</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #0066cc;
    --green: #00e676;
    --green-bg: #003d1f;
    --red: #ff1744;
    --red-bg: #3d0010;
    --yellow: #ffea00;
    --yellow-bg: #3d3200;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-mid: #94a3b8;
    --header-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; min-height: 100vh; }

  /* --- TOP BAR --- */
  .topbar { position: sticky; top: 0; z-index: 100; height: var(--header-h); background: linear-gradient(90deg, #060c1a 0%, #0a1628 60%, #040a14 100%); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 20px rgba(0,212,255,0.08); }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo-badge { background: var(--accent2); color: #fff; font-weight: 900; font-size: 11px; padding: 4px 10px; letter-spacing: 2px; clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); }
  .sys-title { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .sync-indicator { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 5px; }
  .sync-online { color: var(--green); border-color: var(--green); }
  .sync-offline { color: var(--red); border-color: var(--red); }

  /* --- NAVIGATION --- */
  .tab-nav { display: flex; gap: 2px; }
  .tab-btn { padding: 8px 20px; background: transparent; border: 1px solid transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
  .tab-btn.active { background: var(--surface2); color: var(--accent); border-color: var(--border); border-bottom-color: var(--surface2); }

  /* --- LAYOUT --- */
  .page { display: none; padding: 16px 20px; }
  .page.active { display: block; }
  .summary-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .s-card { flex: 1; min-width: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; position: relative; }
  .s-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .s-card.blue::before { background: var(--accent); }
  .s-card.green::before { background: var(--green); }
  .s-num { font-family: 'Share Tech Mono', monospace; font-size: 28px; font-weight: 700; }
  .s-card.blue .s-num { color: var(--accent); }
  .s-card.green .s-num { color: var(--green); }

  /* --- TABLE --- */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; min-width: 1100px; }
  thead tr { background: #0f1e35; border-bottom: 2px solid var(--accent2); }
  th { padding: 10px 8px; font-size: 11px; color: var(--accent); border-right: 1px solid var(--border); }
  tbody tr { background: var(--surface); border-bottom: 1px solid var(--border); }
  tbody td { padding: 7px 8px; text-align: center; border-right: 1px solid rgba(30,58,95,0.5); }

  /* --- UI COMPONENTS --- */
  .check-box { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .check-box.done { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .btn { padding: 6px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
  
  .defect-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--red-bg); color: var(--red); border: 1px solid var(--red); border-radius: 3px; padding: 2px 6px; font-size: 10px; margin: 1px; }

  /* --- MODAL --- */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; width: 90%; max-width: 450px; }
  textarea, input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; width: 100%; }

  /* --- WEEKLY TABLE --- */
  .week-table { width: 100%; border-collapse: collapse; background: var(--surface); }
  .week-table th, .week-table td { border: 1px solid var(--border); padding: 10px; vertical-align: top; }
  .task-item { background: var(--surface2); border-left: 3px solid var(--accent2); padding: 5px; margin-bottom: 5px; font-size: 11px; display: flex; justify-content: space-between; }

  @media print { .topbar, .tab-nav, .btn, .modal-overlay { display: none !important; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-badge">TSMC</div>
    <div>
      <div class="sys-title">雙模幫浦工程管理系統 <span id="sync-status" class="sync-indicator sync-offline">● 離線</span></div>
      <div style="font-size:10px; color:var(--text-dim);">Cloud-Based Dual-Mode Pump Tracker</div>
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('main')">📋 幫浦進度</button>
    <button class="tab-btn" onclick="switchTab('daily')">📅 每日記事</button>
    <button class="tab-btn" onclick="switchTab('weekly')">📆 每周工事</button>
  </div>
</div>

<div id="page-main" class="page active">
  <div class="summary-row">
    <div class="s-card blue"><div class="s-num" id="sum-total">0</div><div class="s-label">幫浦總數</div></div>
    <div class="s-card green"><div class="s-num" id="sum-done">0</div><div class="s-label">全部完成</div></div>
    <div style="flex:2; background:var(--surface); border:1px solid var(--border); padding:12px; border-radius:6px;">
        <div style="font-size:11px; color:var(--text-dim);">當前操作員</div>
        <div style="font-size:18px; color:var(--accent); font-weight:700;">承睿 (系統管理員)</div>
    </div>
  </div>

  <div style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
    <input type="text" id="new-pump-id" placeholder="輸入編號 (如: P-001)" style="width:200px;">
    <button class="btn btn-primary" onclick="addPump()">＋ 新增幫浦</button>
    <button class="btn btn-primary" style="background:#444;" onclick="exportCSV()">⬇ 匯出報表</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>編號</th>
          <th>定位</th><th>PVC配管</th><th>型鋼固定</th><th>地面鎖固</th><th>PP配管</th><th>PP鎖固</th><th>球閥</th><th>防震球</th>
          <th>進度</th>
          <th>瑕疵缺失</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div id="page-daily" class="page">
  <h2 style="margin-bottom:15px; color:var(--accent);">每日施工記事</h2>
  <textarea id="log-input" placeholder="輸入今日現場狀況、機具進場紀錄..." style="height:80px; margin-bottom:10px;"></textarea>
  <button class="btn btn-primary" onclick="addLog()">發佈同步記事</button>
  <div id="daily-log-list" style="margin-top:20px;"></div>
</div>

<div id="page-weekly" class="page">
  <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
    <h2 style="color:var(--accent);">每周工事預排</h2>
    <div>
        <button class="btn" onclick="changeWeek(-1)">◀ 上週</button>
        <span id="week-label" style="margin:0 15px; font-family:'Share Tech Mono';"></span>
        <button class="btn" onclick="changeWeek(1)">下週 ▶</button>
    </div>
  </div>
  <table class="week-table">
    <thead>
        <tr><th>週一</th><th>週二</th><th>週三</th><th>週四</th><th>週五</th><th>週六</th><th>週日</th></tr>
    </thead>
    <tbody id="weekly-body"></tbody>
  </table>
</div>

<div class="modal-overlay" id="defect-modal">
  <div class="modal">
    <h3>⚠️ 登記瑕疵缺失 — <span id="modal-id"></span></h3>
    <input type="text" id="defect-input" placeholder="描述問題 (如: PP管件滲漏)" style="margin:15px 0;">
    <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn" onclick="closeModal('defect-modal')">取消</button>
        <button class="btn btn-danger" onclick="saveDefect()">確認登記</button>
    </div>
  </div>
</div>

<script>
// ── 1. FIREBASE 雲端連線配置 (承睿，請在這裡填入你的 API Key) ──────────────────
const firebaseConfig = {
  apiKey: "填入你的API_KEY",
  authDomain: "你的專案.firebaseapp.com",
  databaseURL: "https://你的專案-default-rtdb.firebaseio.com",
  projectId: "你的專案ID",
  storageBucket: "你的專案.appspot.com",
  appId: "你的APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── 2. 全域變數 ──────────────────────────────────────────
let pumps = [];
let dailyLogs = [];
let weeklyTasks = {};
let currentWeekOffset = 0;
let editingPumpId = null;
const ITEMS = ['定位','PVC配管','型鋼固定','地面鎖固','PP配管','PP鎖固','球閥','防震球'];

// ── 3. 雲端即時監聽 (核心：只要有人動，所有人畫面都會更新) ────────────────────
db.ref('pumps').on('value', (snap) => {
    const data = snap.val();
    pumps = data ? Object.values(data) : [];
    renderTable();
});

db.ref('logs').on('value', (snap) => {
    const data = snap.val();
    dailyLogs = data ? Object.values(data).reverse() : [];
    renderLogs();
});

db.ref('weekly').on('value', (snap) => {
    weeklyTasks = snap.val() || {};
    renderWeekly();
});

// 連線診斷指示燈
db.ref('.info/connected').on('value', (snap) => {
    const el = document.getElementById('sync-status');
    if (snap.val() === true) {
        el.innerText = "● 雲端同步中"; el.className = "sync-indicator sync-online";
    } else {
        el.innerText = "● 離線嘗試中"; el.className = "sync-indicator sync-offline";
    }
});

// ── 4. 幫浦進度功能 ──────────────────────────────────────────
function addPump() {
    const id = document.getElementById('new-pump-id').value.trim();
    if (!id) return;
    db.ref('pumps/' + id).set({
        id: id, items: Array(8).fill(false), defects: [],
        lastUpdate: new Date().toLocaleString(), operator: "承睿"
    });
    document.getElementById('new-pump-id').value = "";
}

function toggleItem(id, idx) {
    const p = pumps.find(x => x.id === id);
    p.items[idx] = !p.items[idx];
    db.ref('pumps/' + id).update({
        items: p.items, 
        lastUpdate: new Date().toLocaleString(),
        operator: "承睿"
    });
}

function deletePump(id) {
    if(confirm(`確定刪除 ${id}？所有裝置將同步移除。`)) db.ref('pumps/' + id).remove();
}

function renderTable() {
    const tbody = document.getElementById('table-body');
    let doneTotal = 0;
    tbody.innerHTML = pumps.map(p => {
        const pct = Math.round((p.items.filter(Boolean).length / 8) * 100);
        if(pct === 100) doneTotal++;
        
        const boxes = p.items.map((v, i) => `
            <td><div class="check-box ${v?'done':''}" onclick="toggleItem('${p.id}',${i})">${v?'✓':''}</div></td>
        `).join('');

        const defects = (p.defects || []).map(d => `<span class="defect-tag">${d}</span>`).join('');

        return `<tr>
            <td style="color:var(--accent); font-weight:700;">${p.id}</td>
            ${boxes}
            <td><b style="color:${pct===100?'var(--green)':'white'}">${pct}%</b></td>
            <td style="text-align:left;">${defects} <button class="btn btn-sm" style="color:var(--red); font-size:10px;" onclick="openDefect('${p.id}')">＋</button></td>
            <td><button class="btn btn-danger" onclick="deletePump('${p.id}')">刪除</button></td>
        </tr>`;
    }).join('');
    document.getElementById('sum-total').innerText = pumps.length;
    document.getElementById('sum-done').innerText = doneTotal;
}

// ── 5. 瑕疵與記事功能 ──────────────────────────────────────────
function openDefect(id) { 
    editingPumpId = id; 
    document.getElementById('modal-id').innerText = id;
    document.getElementById('defect-modal').classList.add('show'); 
}
function closeModal(mid) { document.getElementById(mid).classList.remove('show'); }
function saveDefect() {
    const txt = document.getElementById('defect-input').value.trim();
    if(!txt) return;
    const p = pumps.find(x => x.id === editingPumpId);
    const defs = p.defects || [];
    defs.push(txt);
    db.ref('pumps/' + editingPumpId).update({ defects: defs });
    document.getElementById('defect-input').value = "";
    closeModal('defect-modal');
}

function addLog() {
    const txt = document.getElementById('log-input').value.trim();
    if(!txt) return;
    db.ref('logs').push({ ts: new Date().toLocaleString(), text: txt, user: "承睿" });
    document.getElementById('log-input').value = "";
}
function renderLogs() {
    document.getElementById('daily-log-list').innerHTML = dailyLogs.map(l => `
        <div style="background:var(--surface2); padding:10px; border-radius:4px; margin-bottom:10px; border-left:3px solid var(--accent2);">
            <div style="font-size:10px; color:var(--text-dim);">${l.ts} - ${l.user}</div>
            <div style="margin-top:5px;">${l.text}</div>
        </div>
    `).join('');
}

// ── 6. 每周工事預排功能 ──────────────────────────────────────────
function renderWeekly() {
    const body = document.getElementById('weekly-body');
    const start = getWeekStart(currentWeekOffset);
    document.getElementById('week-label').innerText = `${start.getMonth()+1}/${start.getDate()} 起當週`;
    
    let html = "<tr>";
    for(let i=0; i<7; i++) {
        const date = new Date(start); date.setDate(start.getDate() + i);
        const dateKey = date.toISOString().split('T')[0];
        const tasks = weeklyTasks[dateKey] ? Object.entries(weeklyTasks[dateKey]) : [];
        
        html += `<td>
            <div style="font-size:10px; color:var(--text-dim); margin-bottom:5px;">${date.getMonth()+1}/${date.getDate()}</div>
            ${tasks.map(([tid, t]) => `
                <div class="task-item">${t.text} <span style="cursor:pointer" onclick="delTask('${dateKey}','${tid}')">×</span></div>
            `).join('')}
            <input type="text" placeholder="＋" onkeydown="if(event.key==='Enter')addTask('${dateKey}', this.value)" style="font-size:10px; padding:2px;">
        </td>`;
    }
    body.innerHTML = html + "</tr>";
}
function addTask(dateKey, val) {
    if(!val) return;
    db.ref(`weekly/${dateKey}`).push({ text: val });
}
function delTask(dateKey, tid) { db.ref(`weekly/${dateKey}/${tid}`).remove(); }
function changeWeek(n) { currentWeekOffset += n; renderWeekly(); }
function getWeekStart(offset) {
    const d = new Date(); d.setDate(d.getDate() + (offset * 7));
    const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
}

// ── 7. 輔助功能 ──────────────────────────────────────────
function switchTab(t) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + t).classList.add('active');
    event.target.classList.add('active');
}

function exportCSV() {
    let csv = "幫浦編號,進度," + ITEMS.join(",") + "\n";
    pumps.forEach(p => {
        const pct = Math.round((p.items.filter(Boolean).length / 8) * 100);
        csv += `${p.id},${pct}%,${p.items.map(v=>v?'完成':'未做').join(",")}\n`;
    });
    const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `TSMC_PUMP_REPORT_${new Date().toLocaleDateString()}.csv`;
    link.click();
}
</script>
</body>
</html>
